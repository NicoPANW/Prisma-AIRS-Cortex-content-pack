  script: |-
    import json
    import base64
    import time
    import re
    from datetime import datetime

    import urllib3
    urllib3.disable_warnings()

    # Severity mapping for threshold comparison
    SEVERITY_MAPPING = {'low': 1, 'medium': 2, 'high': 3, 'critical': 4}

    def sanitize_time_inputs(raw_interval: str, raw_unit: str) -> tuple[int, str]:
        """
        Ensures the API only receives perfectly formatted intervals (int) and singular units (str).
        The Prisma AIRS API strictly requires the unit to be singular ('hour' or 'day') and
        will reject unsupported integer combinations (like 2 days or 14 days).
        """
        match = re.search(r'(\d+)', str(raw_interval))
        interval = int(match.group(1)) if match else 1

        unit = str(raw_unit).strip().lower()

        if unit.startswith('hour'):
            clean_unit = 'hour'
            # Enforce exactly 1 hour if they select hours
            if interval != 1:
                interval = 1
        else:
            clean_unit = 'day'
            # Fallback to 1 if the user inputs an unsupported day interval
            if interval not in [1, 7, 30, 60, 90]:
                interval = 1

        return interval, clean_unit

    def meets_severity_threshold(violation_breakdown: dict, min_severity: str) -> bool:
        """Checks if a given violation meets the user-configured minimum severity threshold."""
        min_val = SEVERITY_MAPPING.get(min_severity.lower(), 1)
        for sev in ['critical', 'high', 'medium', 'low']:
            if violation_breakdown.get(sev, 0) > 0:
                return SEVERITY_MAPPING[sev] >= min_val
        return False

    class Client(BaseClient):
        """API Client to handle authentication and direct requests to Prisma AIRS SASE API."""

        def __init__(self, base_url: str, auth_url: str, tsg_id: str, credentials: dict, verify: bool, proxy: bool):
            super().__init__(base_url=base_url, verify=verify, proxy=proxy)
            self.auth_url = auth_url
            self.tsg_id = tsg_id
            self.credentials = credentials
            self.access_token = ""

        def _get_access_token(self):
            """Generates a Bearer token using OAuth2 client credentials."""
            client_id = self.credentials.get('identifier', '')
            client_secret = self.credentials.get('password', '')
            auth_string = f"{client_id}:{client_secret}"
            b64_auth = base64.b64encode(auth_string.encode('utf-8')).decode('utf-8')
            headers = {"Authorization": f"Basic {b64_auth}", "Content-Type": "application/x-www-form-urlencoded"}
            res = super()._http_request(method="POST", full_url=self.auth_url, headers=headers, data="grant_type=client_credentials")
            self.access_token = res.get("access_token")

        def _api_request(self, method: str, url_suffix: str, params: dict = None) -> dict:
            """Wrapper for HTTP requests that automatically attaches the auth token and TSG ID."""
            if not self.access_token:
                self._get_access_token()
            headers = {'Authorization': f'Bearer {self.access_token}', 'x-tsg-id': self.tsg_id, 'Accept': 'application/json'}
            return self._http_request(method=method, url_suffix=url_suffix, params=params, headers=headers)

        def get_violations_list(self, time_interval: int, time_unit: str, limit: int, offset: int) -> dict:
            """Fetches the high-level list of recent AI violations."""
            params = {'time_interval': time_interval, 'time_unit': time_unit, 'limit': limit, 'offset': offset}
            return self._api_request('GET', '/aisec/v1/mgmt/dashboard/v2/violations/list', params)

        def get_threat_snippets(self, scan_id: str, scan_sub_req_id: str = "0") -> dict:
            """Fetches detailed threat snippets showing exactly what triggered the detector."""
            params = {'scan_id': scan_id, 'scan_sub_req_id': scan_sub_req_id}
            return self._api_request('GET', '/aisec/v1/mgmt/dashboard/v2/violations/threatsnippets', params)

        def get_scan_content(self, scan_id: str, scan_sub_req_id: str = "0") -> dict:
            """Fetches the complete, raw prompt and response payload for the given scan ID."""
            params = {'scan_id': scan_id, 'scan_sub_req_id': scan_sub_req_id}
            return self._api_request('GET', '/aisec/v1/mgmt/reports/scancontent', params)

        def get_session_transaction(self, session_id: str, app_id: str, app_name: str, scan_id: str, scan_sub_req_id: str, time_interval: int, time_unit: str) -> dict:
            """Fetches overarching session and transaction metadata for context."""
            params = {
                'session_id': session_id,
                'app_id': app_id,
                'app_name': app_name,
                'scan_id': scan_id,
                'scan_sub_req_id': scan_sub_req_id,
                'time_interval': time_interval,
                'time_unit': time_unit
            }
            return self._api_request('GET', '/aisec/v1/mgmt/dashboard/v2/sessions/sessiontransaction', params)

    def fetch_incidents(client: Client, max_fetch: int, first_fetch_interval: int, first_fetch_unit: str, last_run: dict, min_severity: str, incident_type: str) -> tuple[dict, list]:
        """Main automated polling logic used by the XSIAM 'fetch-incidents' background job."""
        incidents = []

        # FIX: Ensure it falls back to an empty list even if the API explicitly sent null previously
        fetched_ids = last_run.get('fetched_ids') or []

        # Pull latest violations
        violations_response = client.get_violations_list(first_fetch_interval, first_fetch_unit, max_fetch, 0)

        # FIX: Safely extract the items list so it never evaluates to None
        items = violations_response.get('items') or []

        for item in items:
            scan_id = item.get('scan_id')
            session_id = item.get('session_id')

            # Deduplicate by scan_id, because a single session can have multiple distinct violations
            dedup_id = scan_id if scan_id else session_id

            if dedup_id in fetched_ids:
                continue

            app_id = item.get('application_id')
            app_name = item.get('application_name')
            scan_sub_req_id = str(item.get('scan_sub_req_id', 0))

            # Check if this incident crosses our configured severity threshold
            violation_breakdown = item.get('violation_breakdown') or {}
            if not meets_severity_threshold(violation_breakdown, min_severity):
                continue

            # Initialize detail objects
            threat_snippets = {}
            session_transaction = {}
            scan_content = {}

            # Fetch deeper contextual details using the new APIs
            if scan_id:
                threat_snippets = client.get_threat_snippets(scan_id, scan_sub_req_id)
                session_transaction = client.get_session_transaction(session_id, app_id, app_name, scan_id, scan_sub_req_id, first_fetch_interval, first_fetch_unit)
                scan_content = client.get_scan_content(scan_id, scan_sub_req_id)

            # --- EXTRACT ATTRIBUTES ---
            session_attributes = session_transaction.get('attributes') or {}
            airs_user_id = session_attributes.get('user_id', 'Unknown')
            airs_environment = session_attributes.get('environment', 'Unknown')
            airs_model_name = session_attributes.get('model_name', 'Unknown')

            # Extract just the detector names that tripped into a comma-separated string
            dt_breakdown = item.get('detection_type_violation_breakdown') or []
            violated_detectors = []
            for dt in dt_breakdown:
                total = (dt.get('violation_breakdown') or {}).get('total', 0)
                if total > 0:
                    violated_detectors.append(dt.get('detection_type'))
            violated_detectors_str = ", ".join(violated_detectors) if violated_detectors else "None"

            # --- EXTRACT EVERYTHING: Dump the entire payload into a formatted Markdown string ---
            if threat_snippets and threat_snippets.get('detector_snippets'):
                # Dump to a pretty-printed JSON string with a 4-space indent
                raw_json_str = json.dumps(threat_snippets, indent=4)
                # Wrap it in standard Markdown code blocks
                airsthreatsnippets_str = f"```json\n{raw_json_str}\n```"
            else:
                airsthreatsnippets_str = "No snippets available"

            # Extract the pure prompt directly from the scan_content API
            airsprompt_str = (scan_content.get('scan_contents') or {}).get('prompt', 'None')
            if not airsprompt_str:
                airsprompt_str = "None"

            airsprofilename_str = threat_snippets.get('profile_name', item.get('profile_name', 'N/A'))

            breakdown_str = f"Critical: {violation_breakdown.get('critical', 0)}, High: {violation_breakdown.get('high', 0)}, Medium: {violation_breakdown.get('medium', 0)}, Low: {violation_breakdown.get('low', 0)}"

            # Build the Markdown description for the Incident Layout
            description = (
                f"- **Env:** {airs_environment}\n"
                f"- **App:** {app_name}\n"
                f"- **Detectors:** {violated_detectors_str}\n"
            )

            # Map Prisma AIRS severity levels to XSIAM severity levels (1=Low, 4=Critical)
            incident_severity = 1
            if violation_breakdown.get('critical', 0) > 0:
                incident_severity = 4
            elif violation_breakdown.get('high', 0) > 0:
                incident_severity = 3
            elif violation_breakdown.get('medium', 0) > 0:
                incident_severity = 2

            # Create a short ID by taking everything before the first dash (e.g., e7ca31e5)
            short_id = str(dedup_id).split('-')[0]

            # UNIQUE INCIDENT NAME: Bypasses XSIAM deduplication using the short ID
            incident_name = f"AIRS Violation - {app_name} - {short_id}"

            # Build the raw JSON payload.
            incident_details = {
                'violation_overview': item,
                'threat_snippets': threat_snippets,
                'scan_content': scan_content,
                'session_transaction': session_transaction,

                # Flat keys specifically built for the XSIAM Mapper
                'airsapplicationname': app_name,
                'airsuserid': airs_user_id,
                'airsenvironment': airs_environment,
                'airsmodelname': airs_model_name,
                'airssessionid': session_id,
                'airsviolationstatus': item.get('status', 'violated'),
                'airsdetectors': violated_detectors_str,
                'airsprofilename': airsprofilename_str,
                'airsthreatsnippets': airsthreatsnippets_str,
                'airsprompt': airsprompt_str,

                'airsviolationbreakdown': breakdown_str,
                'airstsgid': client.tsg_id
            }

            # Create the final Incident Object
            incident = {
                'name': incident_name,
                'type': incident_type,
                'occurred': item.get('start_time', datetime.utcnow().isoformat() + 'Z'),
                'details': description,
                'severity': incident_severity,
                'rawJSON': json.dumps(incident_details)
            }
            incidents.append(incident)

            # Add to memory so we don't fetch it again next minute
            fetched_ids.append(dedup_id)

            if len(incidents) >= max_fetch:
                break

        # Keep the history array from getting too massive
        return {'fetched_ids': fetched_ids[-500:]}, incidents

    def main():
        params = demisto.params()
        args = demisto.args()
        command = demisto.command()

        # Dynamically pulls from user parameters, defaults to 1 hour
        safe_interval, safe_unit = sanitize_time_inputs(params.get('first_fetch_interval', '1'), params.get('first_fetch_unit', 'hours'))
        incident_type = params.get('incidentType', 'Prisma AIRS Violation')

        try:
            # Initialize the API Client
            client = Client(
                base_url=params.get('url', 'https://api.strata.paloaltonetworks.com'),
                auth_url=params.get('auth_url', 'https://auth.apps.paloaltonetworks.com/auth/v1/oauth2/access_token'),
                tsg_id=params.get('tsg_id', ''),
                credentials=params.get('credentials', {}),
                verify=not params.get('insecure', False),
                proxy=params.get('proxy', False)
            )

            # Execution block based on XSOAR command triggered
            if command == 'test-module':
                # Validates API connectivity
                client.get_violations_list(safe_interval, safe_unit, 1, 0)
                return_results('ok')

            elif command == 'airs-reset-fetch':
                # Clears the deduplication memory (useful during testing)
                demisto.setLastRun({})
                return_results('Fetch state has been reset successfully. You can now run !fetch-incidents to pull data again.')

            elif command == 'airs-get-fetch-sample':
                # Bypasses ingestion and prints what the integration WOULD have ingested directly to the UI
                # FIX: Safeguard the getLastRun call to never be None
                _, incidents = fetch_incidents(client, 10, safe_interval, safe_unit, demisto.getLastRun() or {}, params.get('min_severity', 'Low'), incident_type)
                return_results(incidents)

            elif command == 'fetch-incidents':
                # Primary ingestion loop
                next_run, incidents = fetch_incidents(
                    client=client,
                    max_fetch=int(params.get('max_fetch', 50)),
                    first_fetch_interval=safe_interval,
                    first_fetch_unit=safe_unit,
                    last_run=demisto.getLastRun() or {},
                    min_severity=params.get('min_severity', 'Low'),
                    incident_type=incident_type
                )
                demisto.setLastRun(next_run)
                demisto.incidents(incidents)

            elif command == 'airs-get-violations':
                cmd_interval, cmd_unit = sanitize_time_inputs(args.get('time_interval', '1'), args.get('time_unit', 'hour'))
                res = client.get_violations_list(cmd_interval, cmd_unit, int(args.get('limit', 25)), int(args.get('offset', 0)))
                return_results(CommandResults(outputs_prefix='PrismaAIRS.Violation', outputs_key_field='scan_id', outputs=res.get('items', []), raw_response=res))

            elif command == 'airs-get-threat-snippets':
                res = client.get_threat_snippets(args.get('scan_id'), args.get('scan_sub_req_id', '0'))
                return_results(CommandResults(outputs_prefix='PrismaAIRS.ThreatSnippet', outputs=res, raw_response=res))

            elif command == 'airs-get-scan-content':
                res = client.get_scan_content(args.get('scan_id'), args.get('scan_sub_req_id', '0'))
                return_results(CommandResults(outputs_prefix='PrismaAIRS.ScanContent', outputs=res, raw_response=res))

            elif command == 'airs-get-session-transaction':
                cmd_interval, cmd_unit = sanitize_time_inputs(args.get('time_interval', '1'), args.get('time_unit', 'hour'))
                res = client.get_session_transaction(args.get('session_id'), args.get('app_id'), args.get('app_name'), args.get('scan_id'), args.get('scan_sub_req_id', '0'), cmd_interval, cmd_unit)
                return_results(CommandResults(outputs_prefix='PrismaAIRS.SessionTransaction', outputs=res, raw_response=res))

        except Exception as e:
            demisto.error('Error: ' + str(e))
            return_error('Failed to execute command. Error: ' + str(e))

    if __name__ in ('__main__', '__builtin__', 'builtins'):
        main()
  type: python
  dockerimage: demisto/python3:3.10.13.83255
