description: Prisma AIRS (AI Runtime Security) integration using the Violations API
  endpoint and Scan Content for exact prompts.
detaileddescription: "## Prisma AIRS (AI Runtime Security) Integration\nThis integration
  connects to the Prisma AIRS API to fetch live AI security violations (Prompt Injections,
  Toxic Content, Malicious URLs, Data Leaks) and automatically ingest them as alerts
  (Issues) into Cortex XSIAM.\n\n---\n\n### 1. Prerequisites and Setup Requirements\nBecause
  Cortex XSIAM treats fetched alerts as \"Issues\" and enforces a strict data schema,
  this integration requires specific Custom Fields, a Classifier, an Incoming Mapper,
  and a Custom Layout to function properly. If these are not configured, XSIAM will
  either drop the fetched alerts silently or render the data unreadable.\n\n**A. Required
  Custom Fields**\nInstead of building the custom fields manually, you can automatically
  generate them by importing the provided JSON configuration file. \n* Navigate to
  `Settings > Configurations > Object Setup > Issues > Fields`.\n* Click the **Import**
  button and upload the provided Custom Fields JSON file. \n* This will instantly
  create all required fields with their correct data types.\n\n**B. Required Classifier
  and Mapper**\nInstead of building the mapping logic from scratch, you can import
  the provided configuration to automatically route your data.\n* Navigate to `Settings
  > Configurations > Object Setup > Issues > Classification & Mapping`.\n* Import
  the provided Classifier and Mapper JSON files. \n* This will automatically set up
  the rules to route fetched alerts into the `Prisma AIRS Violation` issue type, and
  perfectly map the JSON payload keys (e.g., `airsprompt`, `airsthreatsnippets`) directly
  to your newly imported Custom Fields.\n\n**C. Custom Layout and Layout Rules**\nTo
  ensure the large JSON payloads and specific AIRS fields are easily readable by analysts
  without squishing or collapsing, you need to import the dedicated AIRS layout.\n*
  **Layouts:** Go to `Settings > Configurations > Object Setup > Issues > Layouts`.
  Click **Import** and upload the provided Layout JSON file. This layout is pre-configured
  with full-width sections to give massive fields like `AIRS Prompt` and `AIRS Threat
  Snippets` the room they need to expand.\n* **Layout Rules:** Go to `Settings > Configurations
  > Object Setup > Issues > Layout Rules` and define a quick rule so XSIAM knows when
  to apply your new view: *(e.g., If Alert Name contains \"AIRS Violation\", use the
  imported layout)*.\n\n**D. AIRS API credentials**\nCreate in SCM AIRS API credentials.
  Then in XSIAM create a new credential in `Settings > Configurations > Integrations
  > Credentials` and fill in a name, username and Password accordingly.\n\n---\n\n###
  2. Field to populate\n\n**TSG ID (Tenant Service Group ID)** => provide the corresponding
  TSGid\n**Credentials (Client ID, Client Secret)** => select the credentials profile
  you created before\n**Classifier** => import the classifier (Prisma AIRS - Classifier)
  imported earlier\n**Mapper (incoming)** => import the mapper (Prisma AIRS Mapper)
  imported earlier  \n**Minimum Severity** => select what is the minimum severity
  to import\n\n---\n\n### 3. Playground Testing Commands\nThe integration includes
  several custom commands designed to help you verify data without waiting for the
  background fetching job. You can execute these in the XSIAM CLI/Playground:\n\n*
  `!airs-reset-fetch`\n  * **Use Case:** Clears the integration's deduplication memory.
  Use this if you want to force XSIAM to re-ingest old violations during testing.\n*
  `!airs-get-fetch-sample`\n  * **Use Case:** Fetches the data and prints the exact
  JSON payload directly to the screen *without* pushing it into the XSIAM incidents
  table. Highly useful for debugging schema errors or mapper misconfigurations.\n*
  `!fetch-incidents`\n  * **Use Case:** Forces an immediate ingestion run. The data
  will be pulled and sent to your Incidents queue silently. Note: This command is
  a reserved XSOAR command and intentionally does not include the `airs-` prefix.\n\n###
  4. API Investigation Commands\nYou can also pull raw data straight from the Prisma
  AIRS API for manual investigation:\n* `!airs-get-violations time_interval=1 time_unit=hour`
  (Retrieves a list of violations).\n* `!airs-get-threat-snippets scan_id=\"<id>\"`
  (Retrieves the specific snippet that triggered the alert).\n* `!airs-get-scan-content
  scan_id=\"<id>\"` (Retrieves the entire raw user prompt).\n* `!airs-get-session-transaction
  session_id=\"<id>\" app_id=\"<id>\" app_name=\"<name>\" scan_id=\"<id>\"` (Retrieves
  overarching metadata regarding the AI interaction)."
